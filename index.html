<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Chirper">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <title>Chirper</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; background: #7C3AED; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; }
    .loader { color: white; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <div id="status">Loading Chirper...</div>
  </div>
  <script>
    window.onerror = function(msg, url, line) { 
      document.getElementById('status').innerText = 'JavaScript error: ' + msg; 
      console.error(msg, url, line);
    };
  </script>
  <script src="flutter_bootstrap.js" async onerror="document.getElementById('status').innerText='Failed to load flutter_bootstrap.js'"></script>
</body>
</html>
