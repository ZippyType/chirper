name: chirper
description: "A Twitter-like social media app built with Flutter and Supabase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Supabase
  supabase_flutter: ^2.8.0
  
  # Routing
  go_router: ^14.6.2
  
  # UI Utilities
  cached_network_image: ^3.4.1
  timeago: ^3.7.0
  flutter_animate: ^4.5.2
  flutter_svg: ^2.0.10
  
  # Image handling
  image_picker: ^1.1.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/